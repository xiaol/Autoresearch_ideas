<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" fill="none">
  <rect width="1400" height="560" rx="28" fill="#F6F7F2"/>
  <rect x="32" y="32" width="1336" height="496" rx="24" fill="url(#bg)"/>
  <text x="72" y="102" fill="#14213D" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700">Reader Skill Execution Loop</text>
  <text x="72" y="142" fill="#36506C" font-family="Helvetica, Arial, sans-serif" font-size="20">A runnable case should move from evidence to judgment, not from lecture to passive note-taking.</text>

  <g>
    <rect x="78" y="212" width="180" height="116" rx="20" fill="#FFF7E8"/>
    <text x="110" y="258" fill="#8A5A00" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">1. Brief</text>
    <text x="110" y="292" fill="#6D5B3D" font-family="Helvetica, Arial, sans-serif" font-size="18">Task, context,</text>
    <text x="110" y="318" fill="#6D5B3D" font-family="Helvetica, Arial, sans-serif" font-size="18">constraints</text>
  </g>

  <g>
    <rect x="304" y="212" width="180" height="116" rx="20" fill="#E9F7FF"/>
    <text x="334" y="258" fill="#085B7A" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">2. Data</text>
    <text x="334" y="292" fill="#355C68" font-family="Helvetica, Arial, sans-serif" font-size="18">CSV, query set,</text>
    <text x="334" y="318" fill="#355C68" font-family="Helvetica, Arial, sans-serif" font-size="18">documents</text>
  </g>

  <g>
    <rect x="530" y="212" width="180" height="116" rx="20" fill="#EAF3EA"/>
    <text x="560" y="258" fill="#276749" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">3. Script</text>
    <text x="560" y="292" fill="#43614B" font-family="Helvetica, Arial, sans-serif" font-size="18">Plain Python,</text>
    <text x="560" y="318" fill="#43614B" font-family="Helvetica, Arial, sans-serif" font-size="18">runnable locally</text>
  </g>

  <g>
    <rect x="756" y="212" width="180" height="116" rx="20" fill="#F3ECFF"/>
    <text x="786" y="258" fill="#5B3F9B" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">4. Output</text>
    <text x="786" y="292" fill="#5E5873" font-family="Helvetica, Arial, sans-serif" font-size="18">Metrics, hits,</text>
    <text x="786" y="318" fill="#5E5873" font-family="Helvetica, Arial, sans-serif" font-size="18">weights, failures</text>
  </g>

  <g>
    <rect x="982" y="212" width="180" height="116" rx="20" fill="#FFECEF"/>
    <text x="1012" y="258" fill="#A61E4D" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700">5. Skill</text>
    <text x="1012" y="292" fill="#74505C" font-family="Helvetica, Arial, sans-serif" font-size="18">Review, frame,</text>
    <text x="1012" y="318" fill="#74505C" font-family="Helvetica, Arial, sans-serif" font-size="18">diagnose, judge</text>
  </g>

  <path d="M258 270H304" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <path d="M484 270H530" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <path d="M710 270H756" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <path d="M936 270H982" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <path d="M1162 328C1162 395 1098 432 938 432H328C189 432 132 398 132 342" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <path d="M122" d="M122 342V343" />
  <path d="M132 342L150 324" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <path d="M132 342L114 324" stroke="#35506B" stroke-width="6" stroke-linecap="round"/>
  <text x="452" y="478" fill="#17324D" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">6. Revise the case, rerun the script, and compare judgment again</text>

  <defs>
    <linearGradient id="bg" x1="32" y1="32" x2="1368" y2="528" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
  </defs>
</svg>

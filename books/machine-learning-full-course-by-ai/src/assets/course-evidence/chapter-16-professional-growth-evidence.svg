  <rect x="522" y="430" width="972" height="400" rx="28" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="106" y="118" fill="#F8FAFC" font-size="42" font-weight="700" font-family="Arial, sans-serif">From Learner to Professional ML Engineer</text>
  <text x="106" y="156" fill="#BBF7D0" font-size="22" font-family="Arial, sans-serif">Chapter 16 evidence panel</text>
  <text x="106" y="212" fill="#BBF7D0" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ANCHOR CASE</text>
  <text x="106" y="246" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Case: a learner with several</tspan><tspan x="106" dy="30">projects but unclear</tspan><tspan x="106" dy="30">specialization direction</tspan></text>
  <text x="106" y="372" fill="#BBF7D0" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT FOCUS</text>
  <text x="106" y="406" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Artifact: development memo</tspan></text>
  <text x="106" y="532" fill="#BBF7D0" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">MAIN SKILL</text>
  <text x="106" y="566" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Skill: ML Professional</tspan><tspan x="106" dy="28">Growth</tspan></text>
  <text x="106" y="676" fill="#BBF7D0" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">LESSON GOAL</text>
  <text x="106" y="710" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Goal: careers grow through</tspan><tspan x="106" dy="28">artifacts, review, and</tspan><tspan x="106" dy="28">deliberate direction, not</tspan><tspan x="106" dy="28">mood and buzzwords</tspan></text>
  <text x="558" y="114" fill="#BBF7D0" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">SKILL PROMPT</text>
  <rect x="558" y="136" width="900" height="240" rx="20" fill="#020617" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="586" y="182" fill="#E2E8F0" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Use $ml-professional-growth to review an ML learner&#x27;s</tspan><tspan x="586" dy="30">recent project artifacts and recommend one</tspan><tspan x="586" dy="30">specialization direction, one portfolio artifact, one</tspan><tspan x="586" dy="30">communication habit to improve, and the next review</tspan><tspan x="586" dy="30">checkpoint.</tspan></text>
  <text x="558" y="474" fill="#BBF7D0" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT CAPTURE</text>
  <rect x="558" y="496" width="900" height="304" rx="20" fill="#020617" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="586" y="542" fill="#F8FAFC" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Artifact focus: development memo</tspan><tspan x="586" dy="30">Case: a learner with several projects but unclear</tspan><tspan x="586" dy="30">specialization direction</tspan><tspan x="586" dy="30">Judgment: careers grow through artifacts, review, and</tspan><tspan x="586" dy="30">deliberate direction, not mood and buzzwords</tspan><tspan x="586" dy="30">Prepare one development memo and one portfolio map slide.</tspan></text>

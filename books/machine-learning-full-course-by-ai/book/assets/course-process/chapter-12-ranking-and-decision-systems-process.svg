00" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">4</tspan></text><text x="188" y="596" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">Discuss exploration and exposure risks.</tspan></text><rect x="96" y="678" width="850" height="106" rx="24" fill="#101827" stroke="#FFFFFF" stroke-opacity="0.10"/><circle cx="146" cy="731" r="22" fill="#FB7185" fill-opacity="0.92"/><text x="146" y="739" fill="#08111F" font-size="24" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">5</tspan></text><text x="188" y="720" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">End with the Ranking Review harness.</tspan></text>

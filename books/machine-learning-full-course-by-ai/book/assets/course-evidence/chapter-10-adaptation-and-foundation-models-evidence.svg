  <text x="106" y="566" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Skill: ML Adaptation</tspan><tspan x="106" dy="28">Decision</tspan></text>

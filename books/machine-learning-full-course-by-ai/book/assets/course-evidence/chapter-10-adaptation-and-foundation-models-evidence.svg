  <text x="586" y="182" fill="#E2E8F0" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Use $ml-adaptation-decision to choose between</tspan><tspan x="586" dy="30">prompting, retrieval, and fine-tuning for an</tspan><tspan x="586" dy="30">enterprise support assistant. Include grounding needs,</tspan><tspan x="586" dy="30">latency, cost, and escalation criteria.</tspan></text>

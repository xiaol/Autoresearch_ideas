  <text x="106" y="710" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Goal: the lightest method</tspan><tspan x="106" dy="28">that can work should usually</tspan><tspan x="106" dy="28">be tested first</tspan></text>

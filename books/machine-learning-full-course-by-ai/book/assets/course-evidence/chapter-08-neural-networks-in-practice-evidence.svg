<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="56" y="52" width="1488" height="796" rx="36" fill="#020617" fill-opacity="0.24" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="74" y="70" width="418" height="760" rx="28" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="522" y="70" width="972" height="332" rx="28" fill="#261B52" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="522" y="430" width="972" height="400" rx="28" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="106" y="118" fill="#F8FAFC" font-size="42" font-weight="700" font-family="Arial, sans-serif">Neural Networks in Practice</text>
  <text x="106" y="156" fill="#DDD6FE" font-size="22" font-family="Arial, sans-serif">Chapter 08 evidence panel</text>
  <text x="106" y="212" fill="#DDD6FE" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ANCHOR CASE</text>
  <text x="106" y="246" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Case: support-ticket</tspan><tspan x="106" dy="30">classification</tspan></text>
  <text x="106" y="372" fill="#DDD6FE" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT FOCUS</text>
  <text x="106" y="406" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Artifact: config, split</tspan><tspan x="106" dy="30">rules, logging plan,</tspan><tspan x="106" dy="30">checkpoint plan</tspan></text>
  <text x="106" y="532" fill="#DDD6FE" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">MAIN SKILL</text>
  <text x="106" y="566" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Skill: ML Neural Project</tspan></text>
  <text x="106" y="676" fill="#DDD6FE" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">LESSON GOAL</text>
  <text x="106" y="710" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Goal: a neural project</tspan><tspan x="106" dy="28">becomes real when another</tspan><tspan x="106" dy="28">engineer can reproduce and</tspan><tspan x="106" dy="28">debug it</tspan></text>
  <text x="558" y="114" fill="#DDD6FE" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">SKILL PROMPT</text>
  <rect x="558" y="136" width="900" height="240" rx="20" fill="#020617" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="586" y="182" fill="#E2E8F0" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Use $ml-neural-project to turn a support-ticket</tspan><tspan x="586" dy="30">classifier experiment into a reproducible project plan</tspan><tspan x="586" dy="30">with config boundaries, split rules, logging,</tspan><tspan x="586" dy="30">validation, checkpointing, and a debug checklist.</tspan></text>
  <text x="558" y="474" fill="#DDD6FE" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT CAPTURE</text>
  <rect x="558" y="496" width="900" height="304" rx="20" fill="#020617" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="586" y="542" fill="#F8FAFC" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Artifact focus: config, split rules, logging plan,</tspan><tspan x="586" dy="30">checkpoint plan</tspan><tspan x="586" dy="30">Case: support-ticket classification</tspan><tspan x="586" dy="30">Judgment: a neural project becomes real when another</tspan><tspan x="586" dy="30">engineer can reproduce and debug it</tspan><tspan x="586" dy="30">Prepare a small project README or pseudo-project structure</tspan><tspan x="586" dy="30">and walk through it.</tspan></text>

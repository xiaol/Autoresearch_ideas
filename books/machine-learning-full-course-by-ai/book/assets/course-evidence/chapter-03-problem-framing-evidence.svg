  <text x="586" y="182" fill="#E2E8F0" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Use $ml-problem-framer to turn this request into a</tspan><tspan x="586" dy="30">framing memo: &quot;We want to predict which support</tspan><tspan x="586" dy="30">tickets should be escalated to a senior engineer.&quot;</tspan></text>

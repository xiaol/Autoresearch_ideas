  <text x="106" y="246" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Case: support-ticket</tspan><tspan x="106" dy="30">escalation and fraud labels</tspan></text>
  <text x="106" y="372" fill="#93C5FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT FOCUS</text>

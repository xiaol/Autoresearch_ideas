  <text x="1036" y="592" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="1036" dy="0">Takeaway: math becomes</tspan><tspan x="1036" dy="30">usable when every symbol is</tspan><tspan x="1036" dy="30">tied to shape, operation,</tspan><tspan x="1036" dy="30">and code</tspan></text>

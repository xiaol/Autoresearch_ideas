  <text x="1036" y="190" fill="#93C5FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ANCHOR CASE</text>
  <text x="1036" y="212" fill="#F8FAFC" font-size="26" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="1036" dy="0">Case: delivery-time</tspan><tspan x="1036" dy="32">prediction and the gradient</tspan><tspan x="1036" dy="32">update behind a simple</tspan><tspan x="1036" dy="32">model</tspan></text>

  <text x="96" y="92" fill="#F8FAFC" font-size="44" font-weight="700" text-anchor="start" font-family="Arial, sans-serif"><tspan x="96" dy="0">Evaluation, Error Analysis,</tspan><tspan x="96" dy="50">and Experiment Design</tspan></text>
  <text x="96" y="146" fill="#99F6E4" font-size="22" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="96" dy="0">metric -&gt; hidden tradeoff -&gt; action consequence</tspan></text>
  <text x="1388" y="108" fill="#99F6E4" font-size="30" text-anchor="end" font-family="Arial, sans-serif">Chapter 06</text>
  <rect x="1000" y="156" width="500" height="170" rx="26" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="1036" y="190" fill="#99F6E4" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ANCHOR CASE</text>
  <text x="1036" y="212" fill="#F8FAFC" font-size="26" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="1036" dy="0">Case: fraud metrics with</tspan><tspan x="1036" dy="32">threshold and slice</tspan><tspan x="1036" dy="32">tradeoffs</tspan></text>
  <rect x="1000" y="348" width="500" height="170" rx="26" fill="#10262A" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="1036" y="382" fill="#99F6E4" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">MAIN SKILL OR HARNESS</text>
  <text x="1036" y="394" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="1036" dy="0">Skill: ML Evaluation Review</tspan></text>
  <rect x="1000" y="540" width="500" height="238" rx="26" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="1036" y="574" fill="#99F6E4" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">VIEWER TAKEAWAY</text>
  <text x="1036" y="592" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="1036" dy="0">Takeaway: a model result is</tspan><tspan x="1036" dy="30">only useful when you know</tspan><tspan x="1036" dy="30">what it hides</tspan></text>
  <rect x="96" y="182" width="850" height="106" rx="24" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.10"/><circle cx="146" cy="235" r="22" fill="#F97316" fill-opacity="0.92"/><text x="146" y="243" fill="#08111F" font-size="24" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">1</tspan></text><text x="188" y="224" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">Open with a model result that sounds strong</tspan><tspan x="188" dy="34">but may mislead.</tspan></text><rect x="96" y="306" width="850" height="106" rx="24" fill="#10262A" stroke="#FFFFFF" stroke-opacity="0.10"/><circle cx="146" cy="359" r="22" fill="#F97316" fill-opacity="0.92"/><text x="146" y="367" fill="#08111F" font-size="24" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">2</tspan></text><text x="188" y="348" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">Show why metric-task fit matters.</tspan></text><rect x="96" y="430" width="850" height="106" rx="24" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.10"/><circle cx="146" cy="483" r="22" fill="#F97316" fill-opacity="0.92"/><text x="146" y="491" fill="#08111F" font-size="24" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">3</tspan></text><text x="188" y="472" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">Explain imbalance, thresholding,</tspan><tspan x="188" dy="34">calibration, and slices.</tspan></text><rect x="96" y="554" width="850" height="106" rx="24" fill="#10262A" stroke="#FFFFFF" stroke-opacity="0.10"/><circle cx="146" cy="607" r="22" fill="#F97316" fill-opacity="0.92"/><text x="146" y="615" fill="#08111F" font-size="24" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">4</tspan></text><text x="188" y="596" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">Connect experiment design to trustworthy</tspan><tspan x="188" dy="34">conclusions.</tspan></text><rect x="96" y="678" width="850" height="106" rx="24" fill="#0F172A" stroke="#FFFFFF" stroke-opacity="0.10"/><circle cx="146" cy="731" r="22" fill="#F97316" fill-opacity="0.92"/><text x="146" y="739" fill="#08111F" font-size="24" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif"><tspan x="146" dy="0">5</tspan></text><text x="188" y="720" fill="#F8FAFC" font-size="28" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="188" dy="0">End with the Evaluation Review harness.</tspan></text>

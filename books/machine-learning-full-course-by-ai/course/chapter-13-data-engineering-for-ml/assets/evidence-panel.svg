  <text x="106" y="118" fill="#F8FAFC" font-size="42" font-weight="700" font-family="Arial, sans-serif">Data Engineering for ML Teams</text>
  <text x="106" y="156" fill="#BAE6FD" font-size="22" font-family="Arial, sans-serif">Chapter 13 evidence panel</text>
  <text x="106" y="212" fill="#BAE6FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ANCHOR CASE</text>
  <text x="106" y="246" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Case: broken joins and stale</tspan><tspan x="106" dy="30">features</tspan></text>
  <text x="106" y="372" fill="#BAE6FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT FOCUS</text>
  <text x="106" y="406" fill="#F8FAFC" font-size="24" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Artifact: data readiness</tspan><tspan x="106" dy="30">review</tspan></text>
  <text x="106" y="532" fill="#BAE6FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">MAIN SKILL</text>
  <text x="106" y="566" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Skill: ML Data Readiness</tspan></text>
  <text x="106" y="676" fill="#BAE6FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">LESSON GOAL</text>
  <text x="106" y="710" fill="#F8FAFC" font-size="22" font-weight="600" text-anchor="start" font-family="Arial, sans-serif"><tspan x="106" dy="0">Goal: data should be trusted</tspan><tspan x="106" dy="28">only after timestamp, join,</tspan><tspan x="106" dy="28">freshness, and lineage</tspan><tspan x="106" dy="28">checks</tspan></text>
  <text x="558" y="114" fill="#BAE6FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">SKILL PROMPT</text>
  <rect x="558" y="136" width="900" height="240" rx="20" fill="#020617" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="586" y="182" fill="#E2E8F0" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Use $ml-data-readiness to review a delivery-time</tspan><tspan x="586" dy="30">prediction dataset for timestamp semantics, join</tspan><tspan x="586" dy="30">risks, freshness, leakage, and train-serve</tspan><tspan x="586" dy="30">consistency.</tspan></text>
  <text x="558" y="474" fill="#BAE6FD" font-size="18" letter-spacing="2" font-family="Arial, sans-serif">ARTIFACT CAPTURE</text>
  <rect x="558" y="496" width="900" height="304" rx="20" fill="#020617" fill-opacity="0.44" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="586" y="542" fill="#F8FAFC" font-size="26" font-weight="500" text-anchor="start" font-family="Arial, sans-serif"><tspan x="586" dy="0">Artifact focus: data readiness review</tspan><tspan x="586" dy="30">Case: broken joins and stale features</tspan><tspan x="586" dy="30">Judgment: data should be trusted only after timestamp,</tspan><tspan x="586" dy="30">join, freshness, and lineage checks</tspan><tspan x="586" dy="30">Prepare one source-and-feature diagram and one readiness</tspan><tspan x="586" dy="30">memo.</tspan></text>

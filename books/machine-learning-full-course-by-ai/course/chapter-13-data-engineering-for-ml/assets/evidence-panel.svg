  <rect x="56" y="52" width="1488" height="796" rx="36" fill="#020617" fill-opacity="0.24" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="74" y="70" width="418" height="760" rx="28" fill="#101827" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="522" y="70" width="972" height="332" rx="28" fill="#0F2C45" stroke="#FFFFFF" stroke-opacity="0.10"/>
